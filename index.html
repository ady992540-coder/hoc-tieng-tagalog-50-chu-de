

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Học tiếng Tagalog cùng Henry</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; text-align: center; background-color: #f0f2f5; margin: 0; }
        .container { width: 95%; max-width: 600px; margin: 10px auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { font-size: 1.5em; color: #1976D2; margin-bottom: 5px; }
        .word-btn { padding: 15px 22px; margin: 6px; cursor: pointer; border: none; background: #2196F3; color: white; border-radius: 30px; display: inline-block; font-size: 18px; transition: transform 0.1s; touch-action: manipulation; }
        .word-btn:active { transform: scale(0.9); background: #0D47A1; }
        #answer-zone { border: 2px dashed #bbdefb; min-height: 100px; margin: 15px 0; padding: 10px; border-radius: 10px; display: flex; justify-content: center; flex-wrap: wrap; align-items: center; background-color: #fafafa; }
        #vietnamese-hint { color: #d32f2f; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; }
        #result { margin-top: 15px; font-weight: bold; font-size: 1.1em; min-height: 1.5em; }
        .success-text { color: #4caf50; }
        #sheet-select { width: 100%; padding: 12px; border-radius: 5px; margin: 10px 0; font-size: 16px; }
        .control-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        #undo-btn, #next-btn { width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; }
        #undo-btn { background-color: #ff9800; color: white; }
        #next-btn { background-color: #4caf50; color: white; }
        @media (min-width: 600px) { .control-btns { flex-direction: row; } #undo-btn, #next-btn { flex: 1; } }
        #loading-msg { color: #666; font-style: italic; }
        #progress { font-size: 0.9em; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Xếp Câu Tagalog</h2>
    <div id="loading-msg">Đang lấy dữ liệu từ máy chủ...</div>
    <select id="sheet-select" style="display:none;"></select>
    <div id="progress">Câu số: 0/0</div>
    <hr>
    <div id="vietnamese-hint">Đang tải...</div>
    <div id="answer-zone"></div>
    <div id="pool"></div>
    <div id="result"></div>
    <div id="extra-hint" style="margin-top: 10px; color: #666; font-style: italic; font-size: 0.9em;"></div>
    <div class="control-btns">
        <button id="undo-btn" onclick="undo()">Hoàn tác (Undo) ↩️</button>
        <button id="next-btn" style="display:none;" onclick="nextQuestion()">Câu tiếp theo ➡️</button>
    </div>
</div>

<script>
    let workbook, currentData = [];
    let correctAnswer = "", userSequence = [];
    let currentIndex = 0; // BIẾN ĐẾM ĐỂ CHẠY THEO THỨ TỰ

    window.addEventListener('DOMContentLoaded', () => {
        const fileName = 'data.xlsx'; 
        fetch(fileName)
            .then(response => {
                if (!response.ok) throw new Error("Không tìm thấy file " + fileName);
                return response.arrayBuffer();
            })
            .then(data => {
                const arrayBuffer = new Uint8Array(data);
                workbook = XLSX.read(arrayBuffer, {type: 'array'});
                const select = document.getElementById('sheet-select');
                select.innerHTML = workbook.SheetNames.map(name => `<option value="${name}">${name}</option>`).join('');
                select.style.display = 'block';
                document.getElementById('loading-msg').style.display = 'none';
                loadSheet(workbook.SheetNames[0]);
            })
            .catch(error => {
                console.error(error);
                document.getElementById('vietnamese-hint').innerText = "Lỗi: " + error.message;
                document.getElementById('loading-msg').innerText = "Vui lòng kiểm tra lại file trên GitHub!";
            });
    });

    document.getElementById('sheet-select').addEventListener('change', (e) => {
        loadSheet(e.target.value);
    });

    function loadSheet(name) {
        const sheet = workbook.Sheets[name];
        // Lấy từ hàng 2 đến 51 (tương ứng chỉ số 1 đến 50 trong mảng)
        currentData = XLSX.utils.sheet_to_json(sheet, {header: 1}).slice(1, 51);
        currentIndex = 0; // Reset về câu đầu tiên khi đổi sheet
        nextQuestion();
    }

    function nextQuestion() {
        if (!currentData || currentData.length === 0) return;

        // KIỂM TRA NẾU HẾT DỮ LIỆU THÌ QUAY LẠI TỪ ĐẦU
        if (currentIndex >= currentData.length) {
            currentIndex = 0;
            alert("Bạn đã hoàn thành 50 câu! Chúng ta sẽ bắt đầu lại từ đầu nhé.");
        }

        let randomRow = currentData[currentIndex];
        
        // Hiển thị số thứ tự câu cho người dùng dễ theo dõi
        document.getElementById('progress').innerText = `Câu số: ${currentIndex + 1} / ${currentData.length}`;

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('undo-btn').style.display = 'block';
        document.getElementById('result').innerText = "";
        document.getElementById('answer-zone').innerHTML = "";
        userSequence = [];

        // Tiếng Việt ở cột A (0)
        document.getElementById('vietnamese-hint').innerText = randomRow[0] || "---";
        // Tiếng Tagalog ở cột B (1)
        correctAnswer = (randomRow[1] || "").toString().trim();
        
        const extraInfo = randomRow[2] || ""; 
        document.getElementById('extra-hint').innerText = extraInfo ? "Gợi ý: " + extraInfo : "";

        if (correctAnswer === "") {
            currentIndex++; // Nếu dòng trống, tự động nhảy sang câu tiếp theo
            nextQuestion();
            return;
        }

        let words = correctAnswer.replace(/[.,?!]/g, "").split(" ").filter(w => w !== "");
        let shuffled = [...words].sort(() => Math.random() - 0.5);

        const pool = document.getElementById('pool');
        pool.innerHTML = "";
        shuffled.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = word;
            btn.onclick = () => {
                userSequence.push(word);
                document.getElementById('answer-zone').appendChild(btn);
                btn.disabled = true;
                btn.style.opacity = "0.3";
                checkResult(words);
            };
            pool.appendChild(btn);
        });

        // Tăng chỉ số để lần sau gọi nextQuestion sẽ ra câu tiếp theo
        currentIndex++;
    }

    function undo() {
        if (userSequence.length === 0) return;
        userSequence.pop();
        const answerZone = document.getElementById('answer-zone');
        const lastBtn = answerZone.lastElementChild;
        if (lastBtn) {
            document.getElementById('pool').appendChild(lastBtn);
            lastBtn.disabled = false;
            lastBtn.style.opacity = "1";
            document.getElementById('result').innerText = "";
        }
    }

    function checkResult(originalWordsArray) {
        if (userSequence.length === originalWordsArray.length) {
            if (userSequence.join(" ").toLowerCase() === originalWordsArray.join(" ").toLowerCase()) {
                document.getElementById('result').innerHTML = "<span class='success-text'>Chính xác! Magaling! 🎉</span>";
                document.getElementById('next-btn').style.display = 'block';
                document.getElementById('undo-btn').style.display = 'none';
            } else {
                document.getElementById('result').innerHTML = "<span style='color:red'>Chưa đúng rồi! Đang reset...</span>";
                setTimeout(() => resetCurrentQuestion(originalWordsArray), 1200);
            }
        }
    }

    function resetCurrentQuestion(originalWordsArray) {
        document.getElementById('answer-zone').innerHTML = "";
        document.getElementById('result').innerText = "";
        document.getElementById('undo-btn').style.display = 'block';
        userSequence = [];
        let shuffled = [...originalWordsArray].sort(() => Math.random() - 0.5);
        const pool = document.getElementById('pool');
        pool.innerHTML = "";
        shuffled.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = word;
            btn.onclick = () => {
                userSequence.push(word);
                document.getElementById('answer-zone').appendChild(btn);
                btn.disabled = true;
                btn.style.opacity = "0.3";
                checkResult(originalWordsArray);
            };
            pool.appendChild(btn);
        });
    }
</script>
